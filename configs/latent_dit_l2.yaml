# =========================================================
# Drifting Model — Latent Space Configuration
# DiT-L/2 with SD-VAE (main result: FID 1.54 on ImageNet)
# =========================================================
# Reference: "Generative Modeling via Drifting" (Deng et al., 2025)
# Architecture: ~463M parameters
# =========================================================

# ── Model ──
model: "DiT-L/2"
input_size: 32               # Latent spatial size (256 / 8)
in_channels: 4               # SD-VAE latent channels
num_classes: 1000             # ImageNet classes
class_dropout_prob: 0.1       # 10% label drop for CFG

# ── Training Mode ──
latent_space: true
vae_path: "stabilityai/sd-vae-ft-mse"

# ── Feature Encoder ──
# MAE ViT-L/16 for computing drifting field in feature space
feature_encoder: "mae"
feature_blocks: [7, 15, 23]  # Multi-scale: blocks at 1/3, 2/3, final
feature_input_size: 256

# ── Drifting Field Configuration ──
# Temperature τ for the kernel k(x,y) = exp(-||x-y||/τ)
drift_temps: [0.05, 0.05, 0.05]
# Loss weights per feature scale
drift_weights: [1.0, 1.0, 1.0]
# V-normalization (normalize drift to unit norm per sample)
v_norm: true

# ── Sample Queue ──
per_class_queue_size: 128     # Positive samples per class
global_queue_size: 1000       # Global unconditional samples
queue_push_size: 64           # Samples pushed per step

# ── Optimizer ──
optimizer: "adamw"
learning_rate: 1.0e-4         # Peak LR
weight_decay: 0.0             # No weight decay (DiT convention)
beta1: 0.9
beta2: 0.999
grad_clip: 1.0                # Gradient clipping norm

# ── Training Schedule ──
total_steps: 800000           # Total training iterations
warmup_steps: 5000            # Linear LR warmup
batch_size: 32                # Per-GPU (256 global with 8 GPUs)

# ── EMA ──
ema_decay: 0.9999

# ── Mixed Precision ──
use_amp: true
amp_dtype: "bf16"             # bfloat16

# ── Data ──
data_path: "/path/to/imagenet"  # SET THIS to your ImageNet root
latent_dir: null              # Optional: precomputed latents path
image_size: 256
num_workers: 8

# ── Logging & Checkpointing ──
output_dir: "./outputs"
experiment_name: "drifting-latent-dit-l2"
log_every: 100
save_every: 10000
sample_every: 5000
use_wandb: false
wandb_project: "drifting-models"

# ── Reproducibility ──
seed: 42
